# Game Settings

game:
  title: "Open World Game - GTA-Like"
  version: "0.2.0"
  fps: 60
  vsync: true

window:
  width: 1920
  height: 1080
  fullscreen: false
  resizable: true

world:
  width: 2000
  height: 2000
  tile_size: 32
  chunks: 64

physics:
  gravity: 9.81
  friction: 0.95
  air_resistance: 0.98

player:
  walk_speed: 150
  run_speed: 300
  jump_force: 600
  health: 100
  armor: 0

vehicles:
  car_speed: 500
  car_acceleration: 200
  bike_speed: 450
  bike_acceleration: 250
  truck_speed: 350
  truck_acceleration: 150

combat:
  player_damage: 15
  npc_damage: 10
  attack_range: 50
  attack_cooldown: 0.5

ai:
  npc_count: 5
  npc_speed: 100
  view_distance: 500
  patrol_speed: 100

missions:
  auto_start_first: true
  show_mission_progress: true

audio:
  master_volume: 0.8
  music_volume: 0.6
  sfx_volume: 0.8

graphics:
  draw_debug: false
  draw_fps: true
  draw_grid: true
  particle_count: 1000
  shadow_quality: "medium"

controls:
  forward: [w, up]
  backward: [s, down]
  left: [a, left]
  right: [d, right]
  jump: [space]
  sprint: [lshift]
  interact: [e]
  fire: [f]
  aim: [rmb]
  inventory: [i]
  map: [m]
  menu: [escape]
